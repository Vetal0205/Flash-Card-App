services:
  database:
    image: postgres:16-alpine
    container_name: flash-card-database
    environment:
      POSTGRES_DB: minddeck
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minddeck"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: dev
    container_name: flash-card-backend
    command: sh -c "npm run sync-db && npm run dev"
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_NAME: MindDeck API
      SERVER: development
      BACKEND_PORT: 5000
      API_VERSION: v1
      SECRET: replace-with-a-long-random-secret
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      DB_HOST: database
      DB_DATABASE: minddeck
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DB_DIALECT: postgres
      DB_TIMEZONE: UTC
      DB_LOG: "false"
      DB_POOL_MIN: 0
      DB_POOL_MAX: 5
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: flash-card-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
